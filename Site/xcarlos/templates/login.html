<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Onde está Carlos?</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Fundo animado */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(108, 92, 231, 0.15) 0%, transparent 50%);
      animation: rotateBg 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes rotateBg {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Texto de fundo sutil */
    body::after {
      content: "✦ CARLOS ✦ CARLOS ✦ CARLOS ✦ ";
      position: fixed;
      bottom: 20px;
      left: 0;
      width: 100%;
      font-size: 14px;
      text-align: center;
      color: rgba(255, 255, 255, 0.03);
      letter-spacing: 5px;
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
      animation: scrollText 30s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(-50%); opacity: 0; }
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .login-container {
      max-width: 450px;
      width: 100%;
      position: relative;
    }

    /* ESCONDER TELAS */
    .screen {
      display: none;
      animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    /* LOGIN PADRÃO */
    #loginScreen {
      display: block;
    }

    /* QUANDO CLICAR EM #cadastro */
    #cadastro:target ~ #loginScreen {
      display: none;
    }

    #cadastro:target ~ #registerScreen {
      display: block;
    }

    /* ANIMAÇÕES */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* BOX DE LOGIN/CADASTRO */
    .login-box {
      background: rgba(30, 30, 46, 0.9);
      backdrop-filter: blur(20px);
      padding: 45px 40px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
    }

    .login-box:hover {
      transform: translateY(-5px);
      border-color: rgba(108, 92, 231, 0.3);
      box-shadow: 0 30px 60px -12px rgba(108, 92, 231, 0.2);
    }

    .login-box h3 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #fff, #a8a4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }

    /* INPUTS */
    .login-box input {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .login-box input:focus {
      outline: none;
      border-color: #6c5ce7;
      background: rgba(108, 92, 231, 0.1);
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
      transform: translateX(5px);
    }

    .login-box input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    /* BOTÃO */
    .login-box button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6c5ce7, #a8a4ff);
      border: none;
      border-radius: 40px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
    }

    .login-box button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px -5px rgba(108, 92, 231, 0.5);
    }

    .login-box button:active {
      transform: translateY(0);
    }

    /* LINK DE TROCA */
    .toggle-link {
      display: block;
      text-align: center;
      margin-top: 25px;
      cursor: pointer;
      text-decoration: none;
      color: #a8a4ff;
      transition: all 0.3s ease;
      font-size: 14px;
      font-weight: 500;
    }

    .toggle-link:hover {
      color: #fff;
      transform: scale(1.05);
      text-shadow: 0 0 10px rgba(168, 164, 255, 0.5);
    }

    /* BOTÃO VOLTAR */
    .back-home {
      text-align: center;
      margin-top: 25px;
    }

    .back-home a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
      padding: 8px 20px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.05);
    }

    .back-home a:hover {
      color: #a8a4ff;
      background: rgba(108, 92, 231, 0.2);
      transform: translateY(-2px);
    }

    /* DIVISOR BONITO */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 25px 0 15px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .divider span {
      margin: 0 12px;
    }

    /* EMOJIS FLUTUANTES (decoração) */
    .floating-emoji {
      position: fixed;
      font-size: 20px;
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
      animation: floatEmoji 8s ease-in-out infinite;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    /* Responsivo */
    @media (max-width: 500px) {
      .login-box {
        padding: 35px 25px;
      }
      
      .login-box h3 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body class="login-page">

  <!-- Emojis flutuantes decorativos -->
  <div class="floating-emoji" style="top: 10%; left: 5%; animation-delay: 0s;">🎯</div>
  <div class="floating-emoji" style="top: 20%; right: 8%; animation-delay: 1s;">👀</div>
  <div class="floating-emoji" style="bottom: 15%; left: 10%; animation-delay: 2s;">🔍</div>
  <div class="floating-emoji" style="bottom: 25%; right: 5%; animation-delay: 1.5s;">📍</div>
  <div class="floating-emoji" style="top: 40%; left: 3%; animation-delay: 2.5s;">😈</div>
  <div class="floating-emoji" style="bottom: 40%; right: 3%; animation-delay: 0.8s;">🤡</div>

  <div class="login-container">

    <!-- ÂNCORA PARA SCROLL -->
    <div id="cadastro"></div>

    <!-- LOGIN -->
    <div id="loginScreen" class="screen">
      <form method="POST" action="/login">
        <div class="login-box">
          <h3>🎯 Bem-vindo de volta</h3>

          <input type="email" name="email" placeholder="seu@email.com" required>
          <input type="password" name="password" placeholder="••••••••" required>

          <button type="submit">🚀 Entrar</button>

          <div class="divider">
            <span>ou</span>
          </div>

          <!-- LINK PARA CADASTRO -->
          <a href="#cadastro" class="toggle-link">
            🃏 Não tem conta? Cadastre-se
          </a>

          <div style="text-align: center; margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.3);">
            ★ Só os fortes entram aqui ★
          </div>
        </div>
      </form>
    </div>

    <!-- CADASTRO -->
    <div id="registerScreen" class="screen">
      <form method="POST" action="/cadastrar">
        <div class="login-box">
          <h3>🤡 Criar conta</h3>

          <input type="text" name="name" placeholder="Nome completo" required>
          <input type="email" name="email" placeholder="seu@email.com" required>
          <input type="password" name="password" placeholder="Crie uma senha" required>

          <button type="submit">😤 Cadastrar</button>

          <div class="divider">
            <span>ou</span>
          </div>

          <!-- VOLTAR PARA LOGIN -->
          <a href="#" class="toggle-link">
            🎭 Já tem conta? Faça login
          </a>

          <div style="text-align: center; margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.3);">
            ⚡ Cadastre-se e comece a caçar o Carlos! ⚡
          </div>
        </div>
      </form>
    </div>

    <div class="back-home">
      <a href="/">
        <span>←</span>
        Voltar para a Home
      </a>
    </div>

  </div>

  <!-- Pequeno script para garantir que o scroll funcione e remover o # da URL após trocar -->
  <script>
    // Remove o #cadastro da URL após a animação para permitir clicar novamente
    if (window.location.hash === '#cadastro') {
      setTimeout(() => {
        history.pushState('', document.title, window.location.pathname);
      }, 500);
    }

    // Clicar no link de voltar para login remove o hash
    document.querySelectorAll('.toggle-link').forEach(link => {
      link.addEventListener('click', function(e) {
        if (this.getAttribute('href') === '#') {
          e.preventDefault();
          window.location.hash = '';
          location.reload();
        }
      });
    });
  </script>

</body>
</html>
